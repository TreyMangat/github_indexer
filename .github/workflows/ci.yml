name: ci

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      risk_tier: ${{ steps.gate.outputs.risk_tier }}
      required_checks_json: ${{ steps.gate.outputs.required_checks_json }}
      violations_json: ${{ steps.gate.outputs.violations_json }}
    steps:
      - name: Checkout (PR head SHA)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Verify head SHA discipline
        run: |
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "HEAD=$(git rev-parse HEAD)"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
          pip install pyyaml

      - name: Run risk policy gate
        id: gate
        run: |
          python scripts/risk_policy_gate.py --github-output "$GITHUB_OUTPUT"

  lint:
    needs: [preflight]
    if: ${{ contains(fromJson(needs.preflight.outputs.required_checks_json), 'lint') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    needs: [preflight]
    if: ${{ contains(fromJson(needs.preflight.outputs.required_checks_json), 'typecheck') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - run: mypy src

  unit-tests:
    needs: [preflight]
    if: ${{ contains(fromJson(needs.preflight.outputs.required_checks_json), 'unit-tests') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - run: pytest --cov=src/repo_recall --cov-report=term-missing --cov-fail-under=45 -q

  security:
    needs: [preflight]
    if: ${{ contains(fromJson(needs.preflight.outputs.required_checks_json), 'security') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install -U pip
          pip install -e .
          pip install pip-audit
      - run: pip-audit || true
        shell: bash
