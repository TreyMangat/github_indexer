services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: repo_recall
      POSTGRES_USER: repo_recall
      POSTGRES_PASSWORD: repo_recall
    ports:
      - "5432:5432"
    volumes:
      - repo_recall_pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - db
    environment:
      APP_ENV: ${APP_ENV:-dev}
      MOCK_MODE: ${MOCK_MODE:-true}
      AUTH_MODE: ${AUTH_MODE:-disabled}

      DATABASE_URL: postgresql://repo_recall:repo_recall@db:5432/repo_recall

      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}

      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-}

      INIT_DB_ON_STARTUP: ${INIT_DB_ON_STARTUP:-true}
      ENABLE_UI: ${ENABLE_UI:-true}
      JOB_WORKERS: ${JOB_WORKERS:-1}

      ENABLE_SECRET_REDACTION: ${ENABLE_SECRET_REDACTION:-true}
      ENABLE_CATALOG: ${ENABLE_CATALOG:-true}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_CONNECT_URL_TEMPLATE: ${GITHUB_CONNECT_URL_TEMPLATE:-/connect/github?actor_id={actor_id}}
      GITHUB_TOKEN_BROKER_URL: ${GITHUB_TOKEN_BROKER_URL:-}
      GITHUB_TOKEN_BROKER_AUTH_TOKEN: ${GITHUB_TOKEN_BROKER_AUTH_TOKEN:-}
      CATALOG_SYNC_INTERVAL_SECONDS: ${CATALOG_SYNC_INTERVAL_SECONDS:-3600}
      CATALOG_REPO_PAGE_SIZE: ${CATALOG_REPO_PAGE_SIZE:-100}
      CATALOG_BRANCH_PAGE_SIZE: ${CATALOG_BRANCH_PAGE_SIZE:-100}
      CATALOG_REQUEST_TIMEOUT_SECONDS: ${CATALOG_REQUEST_TIMEOUT_SECONDS:-20}
      ENABLE_CATALOG_DEV_ENDPOINTS: ${ENABLE_CATALOG_DEV_ENDPOINTS:-false}
    ports:
      - "8080:8080"
    volumes:
      # Optional: mount repo cache so indexing inside the container persists.
      - ./.cache:/app/.cache

volumes:
  repo_recall_pgdata:
